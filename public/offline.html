<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pi Agent Web</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-content: center;
        gap: 0.75rem;
        padding: 1.5rem;
        font-family: system-ui, -apple-system, sans-serif;
        background: #111827;
        color: #f9fafb;
        text-align: center;
      }
      h1 {
        margin: 0;
        font-size: 1.5rem;
      }
      p {
        margin: 0;
        max-width: 28rem;
        line-height: 1.5;
        color: #d1d5db;
      }
      a {
        color: #93c5fd;
      }
    </style>
  </head>
  <body>
    <h1>You are offline</h1>
    <p>
      Reconnect to view sessions or control the Agent. An Agent already accepted by the server may still be running.
    </p>
    <p><a href="/">Return home</a></p>
  </body>
</html>
